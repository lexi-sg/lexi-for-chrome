<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lexi — Chrome Web Store marquee promo tile (1400x560)</title>
<style>
  :root {
    --lexi-indigo: #4F46E5;
    --lexi-indigo-deep: #3730C7;
    --lexi-bg: #F7F8FB;
    --lexi-ink: #0B1220;
    --lexi-muted: #4B5468;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 1400px;
    height: 560px;
    overflow: hidden;
    background: var(--lexi-bg);
  }
  .tile {
    position: relative;
    width: 1400px;
    height: 560px;
    background:
      radial-gradient(60% 90% at 86% 12%, rgba(79,70,229,0.11) 0%, rgba(79,70,229,0) 60%),
      linear-gradient(180deg, #FDFDFE 0%, #F7F8FB 100%);
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--lexi-ink);
  }
  .motif {
    position: absolute;
    right: 40px;
    bottom: -70px;
    width: 560px;
    height: 560px;
    opacity: 0.13;
  }
  .content {
    position: relative;
    z-index: 2;
    padding: 76px 96px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .kicker {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--lexi-indigo-deep);
    margin: 0 0 22px 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .brand img {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: block;
    box-shadow: 0 6px 18px rgba(79,70,229,0.22);
  }
  .brand span {
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: 0.005em;
    color: var(--lexi-ink);
  }
  h1 {
    margin: 40px 0 0 0;
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-weight: 700;
    font-size: 68px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--lexi-ink);
    max-width: 760px;
  }
  .rule {
    margin: 32px 0 26px 0;
    width: 72px;
    height: 4px;
    border-radius: 2px;
    background: var(--lexi-indigo);
  }
  p.value {
    margin: 0;
    max-width: 620px;
    font-size: 22px;
    line-height: 1.5;
    color: var(--lexi-muted);
    font-weight: 500;
  }
  .spacer { flex: 1; }
  .pills {
    display: flex;
    gap: 12px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 9px 18px;
    border-radius: 999px;
    background: #FFFFFF;
    border: 1px solid rgba(11,18,32,0.09);
    box-shadow: 0 2px 6px rgba(11,18,32,0.05);
    font-size: 14px;
    font-weight: 600;
    color: var(--lexi-ink);
  }
  .pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lexi-indigo);
    margin-right: 9px;
    flex: none;
  }
</style>
</head>

        <line x1="100" y1="35" x2="100" y2="170" />
