<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lexi — Chrome Web Store small promo tile (440x280)</title>
<style>
  :root {
    --teal: #24CFA6;
    --bg: #0A0A0A;
    --text-secondary: #969696;
    --text-muted: #7A7F88;
    --border: rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 440px;
    height: 280px;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  }

  .stage {
    position: relative;
    width: 440px;
    height: 280px;
    background: var(--bg);
    overflow: hidden;
  }

  /* faint teal glow, isolated corner bloom -- never a large fill */
  .glow {
    position: absolute;
    width: 420px;
    height: 420px;
    right: -180px;
    bottom: -220px;
    background: radial-gradient(circle, rgba(36,207,166,0.16) 0%, rgba(36,207,166,0.05) 45%, rgba(36,207,166,0) 70%);
    pointer-events: none;
  }

  /* faint hairline grid texture, echoes editorial/law-journal feel */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 55px 100%;
    mask-image: linear-gradient(to bottom, transparent, black 40%, black 70%, transparent);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 26px 28px 24px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .mark {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    display: block;
  }

  .wordmark {
    font-family: "Georgia", "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    font-size: 19px;
    color: #FFFFFF;
    letter-spacing: -0.01em;
  }

  .eyebrow {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .eyebrow .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px rgba(36,207,166,0.7);
    flex: none;
  }

  h1 {
    margin: 10px 0 0;
    font-family: "Georgia", "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.12;
    letter-spacing: -0.01em;
    color: #FFFFFF;
  }

  .sub {
    margin: 12px 0 0;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--text-secondary);
    max-width: 300px;
  }

  .spacer { flex: 1; }

  .divider {
    height: 1px;
    width: 100%;
    background: linear-gradient(to right, rgba(255,255,255,0.26), rgba(255,255,255,0.05) 65%, transparent 90%);
  }

  .foot {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chip {
    font-size: 10.5px;
    font-weight: 500;
    color: #E7E7EA;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 9px 4px 8px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }

  .chip .dot {
    width: 4.5px;
    height: 4.5px;
    border-radius: 50%;
    background: var(--teal);
    flex: none;
  }
</style>
</head>
