<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lexi — Chrome Web Store screenshot 4 (1280x800)</title>
<style>
  :root {
    --teal: #24CFA6;
    --bg: #0A0A0A;
    --text: #FFFFFF;
    --muted: #969696;
    --border: rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 1280px;
    height: 800px;
    overflow: hidden;
    background: var(--bg);
  }
  .stage {
    position: relative;
    width: 1280px;
    height: 800px;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* single restrained glow, not a mesh */
  .glow {
    position: absolute;
    left: 50%;
    top: 210px;
    width: 1180px;
    height: 620px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(36,207,166,0.16) 0%, rgba(36,207,166,0.05) 45%, rgba(36,207,166,0) 72%);
    filter: blur(2px);
    pointer-events: none;
  }
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  .header {
    position: relative;
    z-index: 2;
    flex: 0 0 auto;
    padding: 30px 90px 0;
    text-align: center;
  }
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin-bottom: 16px;
  }
  .brand img {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    display: block;
  }
  .brand span {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .eyebrow::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 10px rgba(36,207,166,0.7);
    display: inline-block;
  }
  h1 {
    margin: 0;
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    font-weight: 700;
    font-size: 42px;
    line-height: 1.18;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .imagewrap {
    position: relative;
    z-index: 2;
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px 60px 42px;
  }
  .frame {
    position: relative;
    height: 100%;
    aspect-ratio: 1280 / 800;
    max-width: 100%;
    border-radius: 14px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.06) inset,
      0 0 0 1px var(--border),
      0 40px 90px -25px rgba(0,0,0,0.75),
      0 0 60px rgba(36,207,166,0.12);
    overflow: hidden;
    background: #111;
  }
  /* Proportional crop: the raw capture is always 1280x800 natively.
     The frame box represents cropW x 800 of it (left-aligned), scaled
     uniformly to fill the frame — so the image is positioned/sized as
     a percentage of the crop box rather than baked-in pixels. */
  .frame .crop {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .frame .crop img {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    width: 100.0000%;
    height: 100%;
  }
  .footer {
    position: absolute;
    z-index: 2;
    left: 0;
    right: 0;
    bottom: 22px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: #55585f;
  }
</style>
</head>
